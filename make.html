            <!DOCTYPE html>
            <html lang="en">
            <head>
            <meta charset="UTF-8">
            <title>Stop Motion Creator</title>
             
            <style>
              body {
                font-family: Arial, sans-serif;
                background: #565a58;
                color: rgb(90, 185, 107);
                text-align: center;
                padding: 20px;
              }
             
              h1 {
                margin-bottom: 10px;
              }
             
              input, select, button {
                margin: 10px;
                padding: 10px;
                border-radius: 8px;
                border: none;
                font-size: 16px;
              }
             
              button {
                background: #3f5257;
                color: rgb(42, 63, 109);
                cursor: pointer;
              }
             
              button:hover {
                background: #00a0d1;
              }
             
              #preview {
                margin-top: 20px;
                border: 2px solid #5289f6;
                background: rgb(0, 0, 0);
              }
             
              video {
                margin-top: 20px;
                width: 80%;
                max-width: 500px;
                border: 2px solid #444;
                border-radius: 10px;
              }
            </style>
            </head>
             
            <body>
             
            <h1>🎬 Stop Motion Creator</h1>
             
            <input type="file" id="images" accept="image/*" multiple>
            <br>
             
            <label>Choose FPS:</label>
            <select id="fps">
              <option value="6">6 FPS</option>
              <option value="12">12 FPS</option>
              <option value="30">30 FPS</option>
              <option value="60">60 FPS</option>
            </select>
             
            <br>
             
            <button onclick="previewAnimation()">▶ Preview</button>
            <button onclick="createVideo()">🎥 Create & Download</button>
             
            <br>
             
            <canvas id="preview" width="500" height="400"></canvas>
             
            <br>
             
            <video id="video" controls></video>
             
            <script>
            let images = [];
             
            document.getElementById("images").addEventListener("change", function(e) {
              images = [];
              const files = e.target.files;
             
              for (let file of files) {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                images.push(img);
              }
            });
             
            function previewAnimation() {
              if (images.length === 0) {
                alert("Upload images first!");
                return;
              }
             
              const canvas = document.getElementById("preview");
              const ctx = canvas.getContext("2d");
              const fps = document.getElementById("fps").value;
              let index = 0;
             
              clearInterval(window.previewInterval);
             
              window.previewInterval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(images[index], 0, 0, canvas.width, canvas.height);
             
                index++;
                if (index >= images.length) index = 0;
              }, 1000 / fps);
            }
             
            function createVideo() {
              if (images.length === 0) {
                alert("Upload images first!");
                return;
              }
             
              const canvas = document.getElementById("preview");
              const ctx = canvas.getContext("2d");
              const fps = document.getElementById("fps").value;
             
              const stream = canvas.captureStream(fps);
              const recorder = new MediaRecorder(stream);
             
              let chunks = [];
             
              recorder.ondataavailable = e => chunks.push(e.data);
             
              recorder.onstop = () => {
                const blob = new Blob(chunks, { type: "video/webm" });
                const url = URL.createObjectURL(blob);
             
                const video = document.getElementById("video");
                video.src = url;
             
                const a = document.createElement("a");
                a.href = url;
                a.download = "stop_motion.webm";
                a.click();
              };
             
              recorder.start();
             
              let index = 0;
             
              const interval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(images[index], 0, 0, canvas.width, canvas.height);
             
                index++;
             
                if (index >= images.length) {
                  clearInterval(interval);
                  recorder.stop();
                }
              }, 1000 / fps);
            }
            </script>
             
            </body>
            </html>
        
        </main>
